name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  linux-clang:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build bld
        run: clang -std=c11 -w build.c -o b -lpthread && ./b amalgamate

      - name: Showcase curl
        run: |
          cd showcase/01_curl && ./fetch-source.sh
          clang -std=c11 -w build.c -o b -lpthread && ./b build -j4
          ./build/bin/curl --version

      - name: Showcase libuv
        run: |
          cd showcase/02_libuv && ./fetch-source.sh
          clang -std=c11 -w build.c -o b -lpthread && ./b build -j4

  windows-msvc:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build bld
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cl /std:c11 /W0 /Fe:b.exe build.c
          b.exe amalgamate

      - name: Showcase curl
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cd showcase\01_curl && curl -LO https://curl.se/download/curl-8.12.0.tar.gz && tar xzf curl-8.12.0.tar.gz && mkdir prj && move curl-8.12.0\lib prj\lib && move curl-8.12.0\src prj\src && move curl-8.12.0\include prj\include && move curl-8.12.0\docs prj\docs
          cl /std:c11 /W0 /Fe:b.exe build.c
          b.exe build -j4
          build\bin\curl.exe --version

  windows-mingw:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          install: mingw-w64-ucrt-x86_64-gcc make curl tar

      - uses: actions/checkout@v4

      - name: Build bld
        run: gcc -std=c11 -w build.c -o b.exe -lpthread && ./b.exe amalgamate

      - name: Showcase curl
        run: |
          cd showcase/01_curl && bash fetch-source.sh
          gcc -std=c11 -w build.c -o b.exe -lpthread && ./b.exe build -j4
          ./build/bin/curl --version

      - name: Showcase libuv
        run: |
          cd showcase/02_libuv && bash fetch-source.sh
          gcc -std=c11 -w build.c -o b.exe -lpthread && ./b.exe build -j4
